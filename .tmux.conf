set-option -g status-position bottom
set-option -g status-style bg=default
set-option -g status-fg white
set-option -a terminal-features 'xterm-256color:RGB'
set -g allow-passthrough on
set -g set-clipboard on
set-option -g default-shell /bin/fish

# Disable mouse-select-pane with clicks (left mouse)
unbind -n MouseDown1Pane
unbind -n MouseDown1PaneRoot

unbind -n MouseDrag1Pane
unbind -n MouseDrag1PaneRoot
unbind -n MouseDown3Pane
unbind -n MouseDown3PaneRoot

# Set tmux to 1-based indexing
set -g base-index 1
setw -g pane-base-index 1

# Enable 256-color and truecolor rendering
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',*:Tc'

# Pane splits should open to the same path as the current pane
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

setenv -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins/"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Plugins
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

set -g @plugin 'tmux-plugins/tmux-yank'

# for vim
set -g @resurrect-strategy-vim 'session'
# for neovim
set -g @resurrect-strategy-nvim 'session'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

